services:
  backend:
    build: ./backend
    container_name: fileshare-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATA_DIR: /data
      UPLOAD_DIR: /data/uploads
      DB_PATH: /data/fileshare.db
    volumes:
      - fileshare-data:/data
    expose:
      - "3000"

  frontend:
    build: ./frontend
    container_name: fileshare-frontend
    restart: unless-stopped
    expose:
      - "80"

  proxy:
    image: nginx:1.27-alpine
    container_name: fileshare-proxy
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  fileshare-data:
