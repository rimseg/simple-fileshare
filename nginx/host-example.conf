# HOST nginx example — TLS termination in front of the Compose stack.
#
# Architecture:
#   internet ──TLS──> host nginx (this file) ──HTTP──> 127.0.0.1:8080
#                                                          │
#                                                          ▼
#                                              fileshare-proxy container
#                                              (nginx/proxy.conf)
#                                                   │         │
#                                                /api/        /
#                                                   ▼         ▼
#                                                backend   frontend
#
# The Compose stack publishes its in-container proxy on 127.0.0.1:8080
# (see docker-compose.yml). The host only needs to forward there —
# DO NOT try to proxy to `backend:3000` / `frontend:80` from the host;
# those names only resolve inside Docker.
#
# Quick start:
#   1. Copy this file to /etc/nginx/sites-available/share.example.com
#      and replace share.example.com with your real hostname.
#   2. sudo ln -s /etc/nginx/sites-available/share.example.com \
#                 /etc/nginx/sites-enabled/
#   3. sudo certbot --nginx -d share.example.com
#      (Certbot will fill in the ssl_* lines and add an HTTP→HTTPS redirect.)
#   4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name share.example.com;

    # Replaced by `certbot --nginx` with an HTTPS redirect.
    return 404;
}

server {
    listen 443 ssl http2;
    server_name share.example.com;

    ssl_certificate     /etc/letsencrypt/live/share.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/share.example.com/privkey.pem;

    # Allow large uploads — match (or exceed) backend MAX_UPLOAD_BYTES
    # AND the client_max_body_size in nginx/proxy.conf.
    client_max_body_size 2g;
    client_body_buffer_size 1m;

    # Long-running uploads
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_request_buffering off;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
