# Example: nginx running on the host (not in Docker), terminating TLS and
# proxying to the docker-compose stack exposed on 127.0.0.1:8080.
#
# Drop into /etc/nginx/sites-available/, replace example.com, then:
#   sudo ln -s ... /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name share.example.com;

    # ACME challenge for certbot
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name share.example.com;

    ssl_certificate     /etc/letsencrypt/live/share.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/share.example.com/privkey.pem;

    # Allow large uploads — match backend MAX_UPLOAD_BYTES
    client_max_body_size 2g;
    client_body_buffer_size 1m;

    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_request_buffering off;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
