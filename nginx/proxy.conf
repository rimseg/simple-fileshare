# Reverse proxy in front of frontend (SPA) and backend (API).
# Uses Docker's embedded DNS (127.0.0.11) so upstream hostnames are
# re-resolved when backend/frontend containers are recreated — without
# this, nginx caches the upstream IP at start and returns 502 after a
# `docker compose up -d --build`.

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Allow large uploads; tune to your MAX_UPLOAD_BYTES.
    client_max_body_size 2g;
    client_body_buffer_size 1m;

    # Long-running uploads
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_request_buffering off;

    # API → backend (variable forces per-request DNS lookup)
    location /api/ {
        set $upstream_backend backend:3000;
        proxy_pass http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # everything else → SPA
    location / {
        set $upstream_frontend frontend:80;
        proxy_pass http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
