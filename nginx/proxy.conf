# IN-CONTAINER PROXY. Runs as the `proxy` service in docker-compose.yml,
# splits incoming traffic between the SPA (frontend:80) and the API
# (backend:3000). The hostnames here only resolve inside the Compose
# network — DO NOT copy this file to /etc/nginx on the host, use
# `host-example.conf` instead.
#
# Uses Docker's embedded DNS (127.0.0.11) so upstream hostnames are
# re-resolved when backend/frontend containers are recreated — without
# this, nginx caches the upstream IP at start and returns 502 after a
# `docker compose up -d --build`.

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Allow large uploads; raise alongside backend MAX_UPLOAD_BYTES *and*
    # the matching limit on your host nginx (if any).
    client_max_body_size 2g;
    client_body_buffer_size 1m;

    # Long-running uploads
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
    proxy_request_buffering off;

    # API → backend (variable forces per-request DNS lookup)
    location /api/ {
        set $upstream_backend backend:3000;
        proxy_pass http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # everything else → SPA
    location / {
        set $upstream_frontend frontend:80;
        proxy_pass http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
